<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC — Obsessive Typography</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #060806;
      font-family: 'Space Mono', 'IBM Plex Mono', monospace;
      color: #00ff66;
    }
    canvas { display: block; }

    /* ── 시작 오버레이 ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #060806;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      transition: opacity 1.2s ease-out;
    }
    #start-overlay .pre {
      font-size: 11px;
      letter-spacing: 6px;
      color: #334;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    #start-overlay h1 {
      font-size: clamp(48px, 8vw, 120px);
      font-weight: 700;
      letter-spacing: 24px;
      color: #fff;
      text-shadow: 0 0 60px rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }
    #start-overlay .sub {
      font-size: 13px;
      color: #556;
      letter-spacing: 3px;
      margin-bottom: 60px;
      text-align: center;
      line-height: 1.8;
    }
    #start-overlay .sub em {
      color: #ff3355;
      font-style: normal;
    }
    #start-btn {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 14px 52px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.35s;
    }
    #start-btn:hover {
      background: #fff;
      color: #060806;
      box-shadow: 0 0 50px rgba(255,255,255,0.25);
    }
    #loading-text {
      display: none;
      margin-top: 24px;
      font-size: 12px;
      color: #00ff66;
      letter-spacing: 3px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Phase 표시 HUD ── */
    #hud {
      display: none; /* 사용자 요청으로 숨김 */
    }
    #hud .phase-label {
      font-size: 11px;
      color: #334;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    #hud .phase-name {
      font-size: 14px;
      color: #00ff66;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0,255,100,0.4);
    }

    /* ── Phase 전환 버튼 ── */
    #phase-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 1s;
      pointer-events: none;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90vw;
    }
    #phase-panel.visible { opacity: 1; pointer-events: auto; }
    .phase-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.15);
      color: #888;
      padding: 7px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .phase-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
    .phase-btn.active {
      color: #00ff66;
      border-color: #00ff66;
      box-shadow: 0 0 12px rgba(0,255,100,0.2);
    }
    /* Phase 5: 붉은 활성화 */
    .phase-btn[data-phase="5"].active {
      color: #ff3355;
      border-color: #ff3355;
      box-shadow: 0 0 12px rgba(255,51,85,0.3);
    }
    /* Phase 6: 글리치 활성화 */
    .phase-btn[data-phase="6"].active {
      color: #fff;
      border-color: #fff;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
      animation: glitchBtn 0.3s infinite;
    }
    @keyframes glitchBtn {
      0% { transform: translate(0,0); }
      25% { transform: translate(-1px, 1px); }
      50% { transform: translate(1px, -1px); }
      75% { transform: translate(-1px, -1px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>
<body>

  <!-- 시작 화면 -->
  <div id="start-overlay">
    <div class="pre">Park Hye Jin ×  Obsessive Typography</div>
    <h1>ABC</h1>
    <div class="sub">
      A, I love you. &nbsp; B, I want you. &nbsp; <em>C, I miss you.</em><br>
      AI가 감정을 학습하다, 결핍에 갇혀 폭주한다.
    </div>
    <button id="start-btn">Enter</button>
    <div id="loading-text">Loading audio…</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="phase-label">Phase</div>
    <div class="phase-name" id="hud-phase">1 — A</div>
  </div>

  <!-- Phase 전환 (6단계) -->
  <div id="phase-panel">
    <button class="phase-btn active" data-phase="1">1: A</button>
    <button class="phase-btn" data-phase="2">2: B</button>
    <button class="phase-btn" data-phase="3">3: C</button>
    <button class="phase-btn" data-phase="4">4: Grid</button>
    <button class="phase-btn" data-phase="5">5: Overload</button>
    <button class="phase-btn" data-phase="6">6: Collapse</button>
    <button class="phase-btn" data-phase="7">7: Unknown</button>
    <button class="phase-btn" data-phase="8">8: Co-Evolution</button>
  </div>

  <script src="abc_typo.js?v=19"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACID GRID — Audio Reactive 3D Terrain</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background-color: #050508;
      font-family: 'Space Mono', monospace;
      color: #00ff66;
    }
    canvas { display: block; }

    /* ── 시작 오버레이 ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #050508;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      transition: opacity 1s ease-out;
    }
    #start-overlay h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: #00ff66;
      text-shadow: 0 0 30px rgba(0,255,100,0.6), 0 0 80px rgba(0,255,100,0.2);
      margin-bottom: 12px;
    }
    #start-overlay .sub {
      font-size: 14px;
      color: #446;
      letter-spacing: 3px;
      margin-bottom: 50px;
    }
    #start-btn {
      background: transparent;
      color: #00ff66;
      border: 1px solid #00ff66;
      padding: 14px 48px;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      letter-spacing: 4px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0,255,100,0.15);
    }
    #start-btn:hover {
      background: #00ff66;
      color: #050508;
      box-shadow: 0 0 40px rgba(0,255,100,0.5);
    }
    #loading-text {
      display: none;
      margin-top: 20px;
      font-size: 13px;
      color: #00ff66;
      letter-spacing: 2px;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── HUD 오버레이 ── */
    #hud {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s;
    }
    #hud.visible { opacity: 1; }
    #hud .label {
      font-size: 11px;
      color: #334;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #hud .value {
      font-size: 13px;
      color: #00ff66;
      text-shadow: 0 0 8px rgba(0,255,100,0.4);
    }
    #hud .row { margin-bottom: 8px; }

    /* ── 모드 토글 ── */
    #mode-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 12px;
      opacity: 0;
      transition: opacity 1s;
      pointer-events: none;
    }
    #mode-panel.visible { opacity: 1; pointer-events: auto; }
    .mode-btn {
      background: rgba(0,255,100,0.06);
      border: 1px solid rgba(0,255,100,0.25);
      color: #00ff66;
      padding: 8px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.25s;
    }
    .mode-btn:hover { background: rgba(0,255,100,0.15); }
    .mode-btn.active {
      background: rgba(0,255,100,0.25);
      border-color: #00ff66;
      box-shadow: 0 0 15px rgba(0,255,100,0.3);
    }
  </style>
</head>
<body>

  <!-- 시작 화면 -->
  <div id="start-overlay">
    <h1>Acid Grid</h1>
    <div class="sub">Audio Reactive 3D Terrain</div>
    <button id="start-btn">Initialize</button>
    <div id="loading-text">Loading audio data…</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="row"><span class="label">Bass </span><span class="value" id="hud-bass">0</span></div>
    <div class="row"><span class="label">Mid  </span><span class="value" id="hud-mid">0</span></div>
    <div class="row"><span class="label">High </span><span class="value" id="hud-high">0</span></div>
    <div class="row"><span class="label">Mode </span><span class="value" id="hud-mode">WIREFRAME</span></div>
  </div>

  <!-- 모드 버튼 -->
  <div id="mode-panel">
    <button class="mode-btn active" data-mode="0">Wireframe</button>
    <button class="mode-btn" data-mode="1">Point Cloud</button>
    <button class="mode-btn" data-mode="2">ASCII</button>
  </div>

  <script src="acid_grid.js"></script>
</body>
</html>

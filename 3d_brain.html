<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Interactive 3D Brain</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 10;
      pointer-events: none; /* 마우스 이벤트가 캔버스로 통과하도록 함 */
      background: rgba(20, 20, 30, 0.7);
      padding: 15px 25px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
    }
    h3 { margin-top: 0; margin-bottom: 10px; font-weight: 300; }
    p { font-size: 13px; color: #ccc; margin-bottom: 5px; }
    .warning { color: #ffaa00; font-size: 12px; margin-top: 15px; }
    button {
      pointer-events: auto; /* 버튼은 클릭 가능하게 */
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 12px;
      margin: 3px 2px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.3); }
    button.active {
      background: rgba(100, 200, 255, 0.5);
      border-color: rgba(100, 200, 255, 0.8);
      box-shadow: 0 0 8px rgba(100, 200, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="ui">
    <h3>Interactive 3D Brain</h3>
    <p>마우스 왼쪽 버튼 클릭 + 드래그: <b>회전</b></p>
    <p>마우스 스크롤: <b>확대/축소</b></p>
    <p>마우스 오른쪽 버튼 클릭 + 드래그: <b>이동</b></p>
    
    <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
      <div style="font-size: 13px; margin-bottom: 5px; pointer-events: none;">행동(Action) 시냅스 활성화:</div>
      <button id="btn-none" class="active">기본 (어둠)</button>
      <button id="btn-명상">명상</button>
      <button id="btn-운동">운동</button>
      <button id="btn-수다">수다</button>
      <button id="btn-자책">자책</button>
      <button id="btn-노래부르기">노래부르기</button>
    </div>

    <p class="warning">* 주의: 프로젝트 폴더에 <b>brain.png</b> 파일이 있어야 합니다.</p>
  </div>
  <script src="3d_brain.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII FLASH — Hypnotic Character Storm</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Space Mono', monospace;
      color: #fff;
    }

    canvas#main-canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
      mix-blend-mode: screen; /* To show youtube background */
      will-change: transform, opacity;
      transform: translateZ(0); /* Hardware acceleration */
    }

    #media-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #media-bg iframe, #media-bg video.local-bg {
      width: 100vw;
      height: 56.25vw;
      min-height: 100vh;
      min-width: 177.77vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #webcam-video {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      transform: scaleX(-1); /* Mirror the webcam feed */
    }

    /* ── Flash overlay for strobe effect ── */
    #flash-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.05s;
      mix-blend-mode: screen;
    }

    /* ── Start Overlay ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      transition: opacity 1.2s ease-out;
    }

    #start-overlay h1 {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 16px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff00ff, #00ffff, #ffff00, #ff00ff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 2s ease infinite;
      margin-bottom: 8px;
    }
    @keyframes gradient-shift {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    #start-overlay .sub {
      font-size: 13px;
      color: #555;
      letter-spacing: 4px;
      margin-bottom: 50px;
      text-transform: uppercase;
    }

    #start-btn {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 16px 56px;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      letter-spacing: 5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    #start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #ff00ff33, #00ffff33, #ffff0033);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #start-btn:hover {
      border-color: #fff;
      box-shadow: 0 0 40px rgba(255,255,255,0.2), 0 0 80px rgba(0,255,255,0.15);
    }
    #start-btn:hover::before { opacity: 1; }

    /* ── HUD ── */
    #hud {
      display: none !important;
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s;
    }
    #hud.visible { opacity: 1; }
    #hud .label {
      font-size: 10px;
      color: #444;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #hud .value {
      font-size: 12px;
      letter-spacing: 1px;
    }
    #hud .row { margin-bottom: 6px; }

    /* ── FPS ── */
    #fps-display {
      display: none !important;
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      font-size: 10px;
      color: #333;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s;
    }
    #fps-display.visible { opacity: 1; }

    /* ── Bottom UI Wrapper ── */
    #bottom-ui-wrapper {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    #bottom-ui-wrapper.slide-down {
      transform: translateY(100%);
    }

    /* ── Speed Slider ── */
    #speed-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      border-top: 1px solid #333;
      padding: 10px 0;
      opacity: 0;
      transition: opacity 1s;
      pointer-events: none;
    }
    #speed-panel.visible { opacity: 1; pointer-events: auto; }

    /* ── Mode Panel ── */
    #mode-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
      opacity: 0;
      transition: opacity 1s;
      pointer-events: none;
    }
    #mode-panel.visible { opacity: 1; pointer-events: auto; }

    .mode-btn, .clip-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.12);
      color: #888;
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.25s;
    }
    .mode-btn:hover, .clip-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }
    .mode-btn.active, .clip-btn.active {
      color: #fff;
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }
    #speed-panel label {
      font-size: 10px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #speed-slider {
      -webkit-appearance: none;
      width: 140px;
      height: 2px;
      background: #333;
      outline: none;
      border-radius: 1px;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .fullscreen-overlay {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 999999 !important;
      object-fit: cover !important;
      pointer-events: auto !important;
      cursor: pointer !important;
      opacity: 1 !important;
      display: block !important;
    }
    #ui-toggle-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.5);
      padding: 6px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
    }
    #ui-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-color: rgba(255, 255, 255, 0.6);
    }
    .ui-hidden #hud,
    .ui-hidden #fps-display,
    .ui-hidden #bottom-ui-wrapper,
    .ui-hidden #split-panels {
      display: none !important;
    }
  
    .hidden-override {
      display: none !important;
    }
</style>
</head>
<body>
  <!-- Background Media Player -->
  <div id="media-bg">
    <iframe id="youtube-player" src="https://www.youtube.com/embed/e2trxT-Z8C0?autoplay=1&mute=1&loop=1&playlist=e2trxT-Z8C0&controls=0&showinfo=0&rel=0&enablejsapi=1" allow="autoplay; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen style="display: block;"></iframe>
    <video id="local-player-1" class="local-bg" loop autoplay muted playsinline style="display: none; object-fit: cover; opacity: 1;"></video>
    <video id="local-player-2" class="local-bg" loop autoplay muted playsinline style="display: none; object-fit: cover; opacity: 0;"></video>
  </div>
  <canvas id="main-canvas"></canvas>
  <div id="flash-layer"></div>

  <!-- Hand Tracking Overlay Canvas -->
  <canvas id="hand-canvas" style="position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:90000;"></canvas>

  <!-- UI Toggle Button -->
  <button id="ui-toggle-btn">👁️ HIDE UI (H)</button>

  <!-- Webcam Elements -->
  <video id="webcam-video" autoplay playsinline style="display:none;"></video>
  <canvas id="webcam-canvas" style="display:none;"></canvas>

  <!-- Start Screen -->
  <div id="start-overlay">
    <h1>Ascii Flash</h1>
    <div class="sub">Hypnotic Character Storm</div>
    <button id="start-btn">Enter the Void</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="row"><span class="label">Mode  </span><span class="value" id="hud-mode">PLASMA</span></div>
    <div class="row"><span class="label">Speed </span><span class="value" id="hud-speed">1.0x</span></div>
    <div class="row"><span class="label">Chars </span><span class="value" id="hud-chars">0</span></div>
    <div class="row"><span class="label">Hue   </span><span class="value" id="hud-hue">0°</span></div>
  </div>

  <div id="fps-display">60 FPS</div>

  <!-- Bottom UI Wrapper -->
  <div id="bottom-ui-wrapper">
    <button id="panel-toggle-btn" class="mode-btn" style="position: absolute; top: -35px; right: 20px; z-index: 10000; border-color: #ffaa00; color: #ffaa00; background: rgba(0,0,0,0.8); pointer-events: auto;">⬇️ HIDE PANELS</button>
    <!-- Speed Control -->
    <div id="speed-panel">
      <label>Speed</label>
      <input type="range" id="speed-slider" min="0.2" max="5" step="0.1" value="1.8">
      <button id="fullscreen-btn" class="mode-btn" style="margin-left: 20px;">⛶ FULLSCREEN (F)</button>
      <button id="toggle-video-btn" class="mode-btn" style="margin-left: 10px;">🎥 TOGGLE VIDEO</button>
      <button id="play-pause-btn" class="mode-btn" style="margin-left: 10px;">⏯️ PLAY/PAUSE</button>
      <button id="replay-btn" class="mode-btn" style="margin-left: 10px;">⏪ REPLAY</button>
      <button id="toggle-webcam-btn" class="mode-btn" style="margin-left: 10px;">📷 TOGGLE WEBCAM</button>
      <button id="full-cam-btn" class="mode-btn" style="margin-left: 10px; border-color: #00ffaa; color: #00ffaa;">📱 FULL CAM</button>
      <button id="hand-tracking-btn" class="mode-btn" style="margin-left: 10px; border-color: #ff00ff; color: #ff00ff;">🖐️ HAND TRACKING</button>
    </div>

    <!-- Bottom Split Panels -->
    <div id="split-panels" style="display: flex; width: 100%; height: 25vh; border-top: 1px solid #333; pointer-events: auto;">
      <!-- Left: Media Deck -->
      <div id="clip-deck" style="width: 50%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; padding: 10px; box-sizing: border-box; border-right: 1px solid #333;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; position: sticky; top: 0; background: rgba(0,0,0,0.95); padding: 4px 0; z-index: 1;">
          <div style="display: flex; gap: 8px; align-items: center;">
            <label style="color: #00ffaa; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;">📂 Media Deck</label>
            <button id="random-play-btn" class="mode-btn" style="border-color: #00ffaa; color: #00ffaa; padding: 3px 8px;">🔀 RANDOM</button>
          </div>
          <div style="display: flex; gap: 5px; align-items: center;">
            <input type="text" id="yt-url-input" placeholder="YouTube URL..." style="background: rgba(0,0,0,0.5); border: 1px solid #555; color: #fff; padding: 4px 8px; width: 120px; font-family: 'Space Mono', monospace; font-size: 10px; outline: none; border-radius: 2px;">
            <button id="yt-submit-btn" class="mode-btn" style="border-color: #ffd700; color: #ffd700; padding: 3px 8px;">GO</button>
          </div>
        </div>
        <div id="clip-buttons" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px;">
          <!-- Buttons injected by JS -->
        </div>
      </div>
      <!-- Right: Effects -->
      <div style="width: 50%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; padding: 10px; box-sizing: border-box;">
        <label style="color: #ff00ff; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 8px; position: sticky; top: 0; background: rgba(0,0,0,0.95); padding: 4px 0; z-index: 1;">🎨 Effects</label>
        <div id="mode-panel">
          <button class="mode-btn active" data-mode="0">Plasma</button>
          <button class="mode-btn" data-mode="1">Vortex</button>
          <button class="mode-btn" data-mode="2">Matrix</button>
          <button class="mode-btn" data-mode="3">Shockwave</button>
          <button class="mode-btn" data-mode="4">Glitch</button>
          <button class="mode-btn" data-mode="5">Decode</button>
          <button class="mode-btn" data-mode="6">Swarm</button>
          <button class="mode-btn" data-mode="7">Hyperspace</button>
          <button class="mode-btn" data-mode="8">Radar</button>
          <button class="mode-btn" data-mode="9">Biolum</button>
          <button class="mode-btn" data-mode="10">Override</button>
          <button class="mode-btn" data-mode="11">Meltdown</button>
          <button class="mode-btn" data-mode="12">Infected</button>
          <button class="mode-btn" data-mode="13">Critical</button>
          <button class="mode-btn" data-mode="14">Prism</button>
          <button class="mode-btn" data-mode="15">Chromatic</button>
          <button class="mode-btn" data-mode="16">Disco</button>
          <button class="mode-btn" data-mode="17">Julia</button>
          <button class="mode-btn" data-mode="18">Sierpinski</button>
          <button class="mode-btn" data-mode="19">Recursion</button>
          <button class="mode-btn" data-mode="20">Static</button>
          <button class="mode-btn" data-mode="21">Tearing</button>
          <button class="mode-btn" data-mode="22">Databend</button>
          <button class="mode-btn" data-mode="23">Neural</button>
          <button class="mode-btn" data-mode="24">Symbiosis</button>
          <button class="mode-btn" data-mode="25">Singularity</button>
          <button class="mode-btn" data-mode="26">Halo</button>
          <button class="mode-btn" data-mode="27">Feathers</button>
          <button class="mode-btn" data-mode="28">Divine</button>
          <button class="mode-btn" data-mode="29">Tensor</button>
          <button class="mode-btn" data-mode="30">Scanner</button>
          <button class="mode-btn" data-mode="31">Sentience</button>
          <button class="mode-btn" data-mode="32">Rave Skull</button>
          <button class="mode-btn" data-mode="33">Skeleton Crew</button>
          <button class="mode-btn" data-mode="34">X-Ray Spine</button>
          <button class="mode-btn" data-mode="35">IDC Scroll</button>
          <button class="mode-btn" data-mode="36">IDC Chaos</button>
          <button class="mode-btn" data-mode="37">IDC Typo</button>
          <button class="mode-btn" data-mode="38">A, Heartbeat</button>
          <button class="mode-btn" data-mode="39">A, Love Rain</button>
          <button class="mode-btn" data-mode="40">A, Neon Love</button>
          <button class="mode-btn" data-mode="41">B, Magnetic</button>
          <button class="mode-btn" data-mode="42">B, Radar</button>
          <button class="mode-btn" data-mode="43">B, Burning</button>
          <button class="mode-btn" data-mode="44" style="border-color: #0cf; color: #0cf;">📷 Cam Motion</button>
          <button class="mode-btn" data-mode="45" style="border-color: #ff4400; color: #ff4400;">🔥 Cam Thermal</button>
          <button class="mode-btn" data-mode="46" style="border-color: #ff00ff; color: #ff00ff;">⚡ Cam Pixelsort</button>
          <button class="mode-btn" data-mode="47" style="border-color: #00ffaa; color: #00ffaa;">👤 Cam Silhouette</button>
          <button class="mode-btn" data-mode="48" style="border-color: #ffffff; color: #ffffff;">👁️ Raw + ASCII</button>
          <div style="width: 100%; height: 6px;"></div>
          <button class="mode-btn" data-mode="49" style="border-color: #ff88aa; color: #ff88aa;">💔 C, I MISS YOU</button>
          <button class="mode-btn" data-mode="50" style="border-color: #00bbff; color: #00bbff;">💧 C, TEARDROPS</button>
          <button class="mode-btn" data-mode="51" style="border-color: #aa88ff; color: #aa88ff;">📼 C, MEMORY</button>
        </div>
      </div>
    </div>
  </div>

  <script src="ascii_flash.js?v=19"></script>
</body>
</html>

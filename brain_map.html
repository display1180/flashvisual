<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Brain Map</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #05050a; /* 깊고 차분한 검정색 */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }
    #ui {
      position: absolute;
      top: 0; left: 0; width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px;
      pointer-events: none;
      z-index: 10;
    }
    .tab-container {
      display: flex;
      background: rgba(20, 20, 30, 0.8);
      border-radius: 30px;
      padding: 5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }
    .tab {
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.3s;
      color: #888;
      user-select: none;
    }
    .tab:hover {
      color: #fff;
    }
    .tab.active {
      background: rgba(100, 200, 255, 0.2);
      color: #fff;
      box-shadow: 0 0 15px rgba(100, 200, 255, 0.2);
    }
    #legend {
      position: absolute;
      top: 100px;
      left: 30px;
      background: rgba(20, 20, 30, 0.8);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      min-width: 200px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h3 { 
      margin-top: 0; margin-bottom: 15px; 
      font-weight: 400; 
      border-bottom: 1px solid rgba(255,255,255,0.2); 
      padding-bottom: 10px; 
      letter-spacing: 1px;
    }
    .legend-item { 
      display: flex; align-items: center; 
      margin-bottom: 12px; font-size: 14px; 
      letter-spacing: 0.5px;
    }
    .dot { 
      width: 14px; height: 14px; 
      border-radius: 50%; margin-right: 12px; 
    }
    #instructions {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      pointer-events: none;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="tab-container">
      <div id="tab-real" class="tab active" onclick="switchTab('real')">🔬 실제 뇌 구조</div>
      <div id="tab-personal" class="tab" onclick="switchTab('personal')">🌻 나의 뇌 정원</div>
    </div>
  </div>

  <div id="legend">
    <h3 id="legend-title">실제 뇌 구조</h3>
    <div id="legend-content"></div>
  </div>

  <div id="instructions">마우스 클릭 + 드래그: 회전 | 스크롤: 확대/축소</div>

  <script src="brain_map.js"></script>
</body>
</html>
